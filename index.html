<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <div class="head">
        <h1>PASSWORD GENERATOR</h1>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- LEFT -->
        <div class="left">
            <div class="out">
                <input class="out-box" type="text" placeholder="Password generated" readonly>
            </div>

            <div class="gen-button">
                <button class="gen-but">Generate Password</button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">

            <div class="length">
                <h4 class="length-head">Enter the length of the password you need.</h4>
            </div>

            <div class="inp">
                <input class="input-len" type="range" min="1" max="8" value="4">
                <span>4</span>
            </div>

            <div class="choose">
                <h4>Choose the characteristics you want in your password.</h4>
            </div>

            <form class="options" id="myform">
                <label><input type="checkbox" value="a-z"> a-z</label><br>
                <label><input type="checkbox" value="A-Z"> A-Z</label><br>
                <label><input type="checkbox" value="1-9"> 1-9</label><br>
                <label><input type="checkbox" value="!@#$"> !@#$</label>
            </form>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="end">
        <h3 class="instruction">
            Enter the length and select features for your password.
        </h3>
        <h3 class="instruction2">
            Click generate to create a strong password.
        </h3>
    </div>

    <script src="app.js"></script>
</body>
</html>
